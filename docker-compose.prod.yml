# docker-compose.prod.yml — Production overrides for EC2 t2.micro (1 GB RAM)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Memory limits are tuned for 1 GB total. Adjust if using larger instance.
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-ssl.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: 64m

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports: []
    mem_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      - CORS_ALLOWED_ORIGINS=https://frontend-omega-blush-87.vercel.app
      - TRUSTED_PROXY_COUNT=1
      - RATE_LIMIT_PER_USER=100

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=1
    mem_limit: 200m
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    mem_limit: 64m
    restart: unless-stopped

  postgres:
    mem_limit: 128m
    restart: unless-stopped

  redis:
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    mem_limit: 80m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3

  minio:
    ports: []
    mem_limit: 96m
    restart: unless-stopped

  chroma:
    ports: []
    mem_limit: 160m
    restart: unless-stopped

  # Disable heavy observability services on free tier
  otel-collector:
    profiles: ["observability"]

  prometheus:
    profiles: ["observability"]
