services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    ports: []  # not exposed directly — nginx handles it

  worker:
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2

  # Remove dev-only services from prod exposure
  minio:
    ports: []  # internal only

  chroma:
    ports: []  # internal only

  otel-collector:
    ports: []

  prometheus:
    ports: []
