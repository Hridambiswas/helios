apiVersion: apps/v1
kind: Deployment
metadata:
  name: helios-api
  labels:
    app: helios
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: helios
      component: api
  template:
    metadata:
      labels:
        app: helios
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: helios:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: helios-config
            - secretRef:
                name: helios-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helios-worker
  labels:
    app: helios
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helios
      component: worker
  template:
    metadata:
      labels:
        app: helios
        component: worker
    spec:
      containers:
        - name: worker
          image: helios:latest
          command: ["celery", "-A", "workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: helios-config
            - secretRef:
                name: helios-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
