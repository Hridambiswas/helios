global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: helios

scrape_configs:
  - job_name: "helios-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_timeout: 10s

  - job_name: "helios-worker"
    static_configs:
      - targets: ["worker:9100"]
    scrape_timeout: 10s

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
