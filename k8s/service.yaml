apiVersion: v1
kind: Service
metadata:
  name: helios-api
  labels:
    app: helios
spec:
  selector:
    app: helios
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helios-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
    - host: helios.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: helios-api
                port:
                  number: 80
