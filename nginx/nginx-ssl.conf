events { worker_connections 1024; }

http {
    upstream helios_api {
        server api:8000;
    }

    # HTTP: ACME challenge pass-through, everything else redirects to HTTPS
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name helios-hridam.ddns.net;

        ssl_certificate     /etc/letsencrypt/live/helios-hridam.ddns.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/helios-hridam.ddns.net/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 50M;

        location / {
            proxy_pass http://helios_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }
    }
}
