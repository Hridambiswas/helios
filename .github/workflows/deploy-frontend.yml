name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Vercel
        run: cd frontend && npx vercel --prod --token=${{ secrets.VERCEL_TOKEN_TWO }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || 'team_ofA6Jc0CdsYFcOUH8TBhkG2y' }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || 'prj_gsuByrxhtebWuprPEuORW5VmsaBT' }}
