name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            # Sync EC2 to exactly match remote — hard reset avoids conflicts
            # from locally modified files (e.g. nginx/nginx.conf after the
            # repo restructure that moved it into backend/)
            cd /home/ubuntu/helios
            git fetch origin main
            git reset --hard origin/main

            # One-time migration: move .env from old root location into backend/
            if [ -f /home/ubuntu/helios/.env ] && [ ! -f /home/ubuntu/helios/backend/.env ]; then
              cp /home/ubuntu/helios/.env /home/ubuntu/helios/backend/.env
              echo ".env migrated from root to backend/"
            fi

            # Inject secrets into backend/.env (idempotent — only adds if missing)
            if ! grep -q "SUPABASE_DATABASE_URL" /home/ubuntu/helios/backend/.env 2>/dev/null; then
              echo "SUPABASE_DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }}" >> /home/ubuntu/helios/backend/.env
            fi
            if ! grep -q "GITHUB_CLIENT_ID" /home/ubuntu/helios/backend/.env 2>/dev/null; then
              echo "GITHUB_CLIENT_ID=${{ secrets.GH_OAUTH_CLIENT_ID }}" >> /home/ubuntu/helios/backend/.env
            fi
            if ! grep -q "GITHUB_CLIENT_SECRET" /home/ubuntu/helios/backend/.env 2>/dev/null; then
              echo "GITHUB_CLIENT_SECRET=${{ secrets.GH_OAUTH_CLIENT_SECRET }}" >> /home/ubuntu/helios/backend/.env
            fi

            # Free disk space before build — stale layers accumulate and fill the volume
            docker system prune -a -f
            cd /home/ubuntu/helios/backend
            # Use -p helios to keep the same project name as before the repo
            # restructure (previously run from root, defaulting to "helios").
            # Without this, compose defaults to "backend" and old containers
            # keep their ports, causing bind failures.
            docker compose -p helios -f docker-compose.yml -f docker-compose.prod.yml build api worker beat
            docker compose -p helios -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate api worker beat
            docker image prune -f
            echo "Deploy complete at $(date)"
