name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            # Inject secrets into .env (idempotent — only adds if missing)
            if ! grep -q "SUPABASE_DATABASE_URL" /home/ubuntu/helios/backend/.env 2>/dev/null; then
              echo "SUPABASE_DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }}" >> /home/ubuntu/helios/backend/.env
            fi
            if ! grep -q "GITHUB_CLIENT_ID" /home/ubuntu/helios/backend/.env 2>/dev/null; then
              echo "GITHUB_CLIENT_ID=${{ secrets.GH_OAUTH_CLIENT_ID }}" >> /home/ubuntu/helios/backend/.env
            fi
            if ! grep -q "GITHUB_CLIENT_SECRET" /home/ubuntu/helios/backend/.env 2>/dev/null; then
              echo "GITHUB_CLIENT_SECRET=${{ secrets.GH_OAUTH_CLIENT_SECRET }}" >> /home/ubuntu/helios/backend/.env
            fi
            # Free disk space before build — stale layers accumulate and fill the volume
            docker system prune -a -f
            cd /home/ubuntu/helios
            git pull origin main
            cd /home/ubuntu/helios/backend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build api worker beat
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate api worker beat
            docker image prune -f
            echo "Deploy complete at $(date)"
