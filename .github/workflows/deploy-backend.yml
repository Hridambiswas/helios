name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths-ignore:
      - 'frontend/**'
      - '*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /home/ubuntu/helios
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build api worker beat
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate api worker beat
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T api alembic upgrade head
            docker image prune -f
            echo "Deploy complete at $(date)"
